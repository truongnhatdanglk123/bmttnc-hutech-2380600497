<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Playfair Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
    <div class="container mt-5 p-4 bg-white shadow rounded">
        <h2 class="text-center text-primary mb-4">PLAYFAIR CIPHER</h2>
        <hr>
        <h4 class="text-info">MÃ HÓA</h4>
        <form method="POST" action="/playfair/encrypt">
            <div class="form-group">
                <label>Văn bản gốc:</label>
                <input type="text" class="form-control" name="inputPlainText" required>
            </div>
            <div class="form-group">
                <label>Khóa (Key):</label>
                <input type="text" class="form-control" name="inputKeyPlain" required>
            </div>
            <button type="submit" class="btn btn-primary">Encrypt</button>
        </form>
        <hr class="my-4">
        <h4 class="text-success">GIẢI MÃ</h4>
        <form method="POST" action="/playfair/decrypt">
            <div class="form-group">
                <label>Văn bản mã:</label>
                <input type="text" class="form-control" name="inputCipherText" required>
            </div>
            <div class="form-group">
                <label>Khóa (Key):</label>
                <input type="text" class="form-control" name="inputKeyCipher" required>
            </div>
            <button type="submit" class="btn btn-success">Decrypt</button>
        </form>
        <div class="mt-3 text-muted small">
            Lưu ý: Ký tự 'J' sẽ được chuyển thành 'I'.
        </div>
        <div class="mt-3">
            <a href="/" class="btn btn-secondary">Trang chủ</a>
        </div>
    </div>
</body>
</html>

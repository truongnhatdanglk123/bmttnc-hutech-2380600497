<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Rail Fence Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
    <div class="container mt-5 p-4 bg-white shadow rounded">
        <h2 class="text-center text-primary mb-4">RAIL FENCE CIPHER</h2>
        <hr>
        <h4 class="text-info">ENCRYPTION</h4>
        <form method="POST" action="/railfence/encrypt">
            <div class="form-group">
                <label>Plain text:</label>
                <input type="text" class="form-control" name="inputPlainText" required>
            </div>
            <div class="form-group">
                <label>Number of Rails (Key):</label>
                <input type="number" class="form-control" name="inputKeyPlain" min="2" required>
            </div>
            <button type="submit" class="btn btn-primary">Encrypt</button>
        </form>
        <hr class="my-4">
        <h4 class="text-success">DECRYPTION</h4>
        <form method="POST" action="/railfence/decrypt">
            <div class="form-group">
                <label>Cipher text:</label>
                <input type="text" class="form-control" name="inputCipherText" required>
            </div>
            <div class="form-group">
                <label>Number of Rails (Key):</label>
                <input type="number" class="form-control" name="inputKeyCipher" min="2" required>
            </div>
            <button type="submit" class="btn btn-success">Decrypt</button>
        </form>
        <div class="mt-3">
            <a href="/" class="btn btn-secondary">Về Trang Chủ</a>
        </div>
    </div>
</body>
</html>

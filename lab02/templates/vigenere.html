<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Vigenere Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
    <div class="container mt-5 p-4 bg-white shadow rounded">
        <h2 class="text-center text-primary mb-4">VIGENERE CIPHER</h2>
        <hr>
        <h4 class="text-info">MÃ HÓA (ENCRYPTION)</h4>
        <form method="POST" action="/vigenere/encrypt">
            <div class="form-group">
                <label>Văn bản gốc (Plain text):</label>
                <input type="text" class="form-control" name="inputPlainText" required>
            </div>
            <div class="form-group">
                <label>Khóa (Key - Chuỗi chữ):</label>
                <input type="text" class="form-control" name="inputKeyPlain" required>
            </div>
            <button type="submit" class="btn btn-primary">Encrypt</button>
        </form>
        <hr class="my-4">
        <h4 class="text-success">GIẢI MÃ (DECRYPTION)</h4>
        <form method="POST" action="/vigenere/decrypt">
            <div class="form-group">
                <label>Văn bản mã (Cipher text):</label>
                <input type="text" class="form-control" name="inputCipherText" required>
            </div>
            <div class="form-group">
                <label>Khóa (Key - Chuỗi chữ):</label>
                <input type="text" class="form-control" name="inputKeyCipher" required>
            </div>
            <button type="submit" class="btn btn-success">Decrypt</button>
        </form>
        <div class="mt-3">
            <a href="/" class="btn btn-secondary">Quay lại Trang chủ</a>
        </div>
    </div>
</body>
</html>

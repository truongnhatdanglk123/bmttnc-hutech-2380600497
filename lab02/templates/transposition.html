<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Transposition Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
    <div class="container mt-5 p-4 bg-white shadow rounded">
        <h2 class="text-center text-primary mb-4">TRANSPOSITION CIPHER</h2>
        <hr>
        <h4 class="text-info">MÃ HÓA HOÁN VỊ</h4>
        <form method="POST" action="/transposition/encrypt">
            <div class="form-group">
                <label>Plain text:</label>
                <input type="text" class="form-control" name="inputPlainText" required>
            </div>
            <div class="form-group">
                <label>Khóa (Số cột):</label>
                <input type="number" class="form-control" name="inputKeyPlain" min="1" required>
            </div>
            <button type="submit" class="btn btn-primary">Encrypt</button>
        </form>
        <hr class="my-4">
        <h4 class="text-success">GIẢI MÃ HOÁN VỊ</h4>
        <form method="POST" action="/transposition/decrypt">
            <div class="form-group">
                <label>Cipher text:</label>
                <input type="text" class="form-control" name="inputCipherText" required>
            </div>
            <div class="form-group">
                <label>Khóa (Số cột):</label>
                <input type="number" class="form-control" name="inputKeyCipher" min="1" required>
            </div>
            <button type="submit" class="btn btn-success">Decrypt</button>
        </form>
        <div class="mt-3">
            <a href="/" class="btn btn-secondary">Trang chủ</a>
        </div>
    </div>
</body>
</html>
